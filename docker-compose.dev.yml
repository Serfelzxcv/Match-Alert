services:
  backend:
    build:
      target: deps
    command: sh -c "npx prisma generate && npx prisma migrate deploy && npm run start:dev"
    environment:
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
    volumes:
      - ./backend:/app
      - /app/node_modules

  frontend:
    build:
      target: deps
    command: npm run dev -- -H 0.0.0.0
    environment:
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
